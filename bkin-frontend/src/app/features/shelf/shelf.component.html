<div class="min-h-screen bg-obsidian">

  <!-- ═══════════ NAVBAR ═══════════ -->
  <nav class="sticky top-0 z-50 bg-surface-100/80 backdrop-blur-md border-b border-surface-300">
    <div class="max-w-7xl mx-auto px-3 sm:px-6">
      <div class="flex items-center h-14 sm:h-16 gap-1 sm:gap-3">

        <!-- Logo -->
        <a routerLink="/home" class="flex items-center gap-1.5 flex-shrink-0 hover:opacity-80 transition-opacity mr-1 sm:mr-2">
          <img src="assets/bookedin_logo_transparent.png" alt="" class="h-7 sm:h-9 w-auto" />
          <span class="text-crimson text-base sm:text-xl font-extrabold tracking-tight">BookedIn</span>
        </a>

        <div class="flex-1"></div>

        <!-- Library -->
        <a routerLink="/library"
          class="flex items-center gap-1 sm:gap-1.5 text-gray-400 hover:text-white transition-colors text-sm font-medium px-1.5 sm:px-2 py-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
          <span class="hidden sm:inline">Library</span>
        </a>

        <!-- Shelf (active) -->
        <a routerLink="/shelf"
          class="flex items-center gap-1 sm:gap-1.5 text-crimson transition-colors text-sm font-medium px-1.5 sm:px-2 py-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
          </svg>
          <span class="hidden sm:inline">Shelf</span>
        </a>

        <!-- Chat -->
        <a routerLink="/chat/general"
          class="flex items-center gap-1 sm:gap-1.5 text-gray-400 hover:text-white transition-colors text-sm font-medium px-1.5 sm:px-2 py-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span class="hidden sm:inline">Chat</span>
        </a>

        <!-- Profile avatar -->
        <a routerLink="/profile"
          class="w-8 h-8 rounded-full bg-crimson/20 border border-crimson/40 flex items-center justify-center
                 text-crimson text-sm font-bold flex-shrink-0 overflow-hidden hover:border-crimson transition-all"
          title="My Profile">
          <img *ngIf="myProfilePicUrl" [src]="myProfilePicUrl"
            class="w-full h-full object-cover" onerror="this.onerror=null;this.style.display='none'" />
          <span *ngIf="!myProfilePicUrl">{{ myAvatarLetter }}</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-5 sm:py-8">

    <!-- Tab Bar -->
    <div class="flex gap-1 bg-surface-200 rounded-xl p-1 mb-8">
      <button *ngFor="let tab of ['WANT_TO_READ', 'READING', 'COMPLETED']"
        (click)="setTab(tab)"
        [ngClass]="activeTab === tab
          ? 'flex-1 py-2.5 rounded-lg bg-crimson text-white text-sm font-medium transition-all'
          : 'flex-1 py-2.5 rounded-lg text-gray-400 hover:text-white text-sm transition-all'">
        {{ getTabLabel(tab) }}
        <span class="ml-1.5 text-xs opacity-70">({{ tabCounts[tab] }})</span>
      </button>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="flex justify-center py-20">
      <svg class="animate-spin h-8 w-8 text-crimson" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 12 0 12 4.418z"></path>
      </svg>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && filteredItems.length === 0" class="text-center py-20">
      <p class="text-4xl mb-3">📚</p>
      <p class="text-gray-500 text-lg">No books in "{{ getTabLabel(activeTab) }}" yet.</p>
      <a routerLink="/home"
        class="inline-block mt-4 bg-crimson hover:bg-crimson-hover text-white text-sm
               font-medium rounded-lg px-6 py-2.5 transition-all">
        Discover Books
      </a>
    </div>

    <!-- Book List -->
    <div *ngIf="!isLoading && filteredItems.length > 0" class="space-y-4">
      <div *ngFor="let item of filteredItems" (click)="goToBook(item.book.id)"
        class="bkin-card flex gap-4 p-4 cursor-pointer">

        <!-- Cover -->
        <div class="flex-shrink-0 w-16 rounded-lg overflow-hidden aspect-[2/3] bg-surface-200">
          <img [src]="item.book.coverImageUrl" [alt]="item.book.title"
            class="w-full h-full object-cover"
            onerror="this.onerror=null;this.src='https://placehold.co/64x96/1A1A1A/DC143C?text=B'" />
        </div>

        <!-- Info -->
        <div class="flex-1 min-w-0">
          <h3 class="text-white font-semibold text-sm line-clamp-1">{{ item.book.title }}</h3>
          <p class="text-gray-500 text-xs mt-0.5">{{ item.book.author }}</p>
          <span class="inline-block mt-2 text-[10px] text-crimson bg-crimson/10 border border-crimson/20 rounded px-2 py-0.5">
            {{ item.book.genre?.name }}
          </span>

          <!-- Stars (for completed) -->
          <div *ngIf="activeTab === 'COMPLETED' && item.rating" class="flex items-center gap-1 mt-2">
            <svg *ngFor="let s of getStars(item.rating)"
              [ngClass]="s <= item.rating! ? 'text-crimson' : 'text-surface-400'"
              xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
            <span class="text-gray-500 text-xs ml-1">{{ item.rating }}/5</span>
          </div>

          <p *ngIf="activeTab === 'COMPLETED' && item.review"
            class="text-gray-500 text-xs mt-1.5 line-clamp-2 italic">
            "{{ item.review }}"
          </p>
        </div>

        <!-- Arrow -->
        <div class="flex-shrink-0 flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>
